<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Offline</title>
    <style>
      body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;margin:0;background:#0f172a;color:#e2e8f0}
      .wrap{max-width:720px;margin:0 auto;padding:48px 20px}
      .card{background:#111827;border:1px solid #334155;border-radius:16px;padding:18px}
      h1{margin:0 0 8px;font-size:20px}
      p{margin:0;color:#cbd5e1;line-height:1.45}
      .hint{margin-top:12px;font-size:13px;color:#94a3b8}
      a{color:#e2e8f0}
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>You’re offline</h1>
        <p>
          The portal can still be used offline after it has been opened once while online.
          Please reconnect and open the Maintenance form once to enable offline reload.
        </p>
        <p class="hint">
          Tip: In iPhone PWA mode, open <a href="/maintenance/new">Maintenance → New</a> while online, then you can reload it offline.
        </p>
      </div>
    </div>
  </body>
</html>
